<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beauty Salon Outreach Leads</title>
<style>
  :root{
    --bg:#0f0e0f; --card:#1a181a; --line:#2a272a; --txt:#f2ede9; --muted:#9a9398;
    --gold:#c9a96a; --hi:#e0484d; --med:#e0a23a; --low:#5a8f6b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--txt);padding:32px 20px 80px;line-height:1.4}
  .wrap{max-width:1200px;margin:0 auto}
  h1{font-size:28px;font-weight:700;letter-spacing:-.5px}
  h1 span{color:var(--gold)}
  .sub{color:var(--muted);margin:6px 0 24px;font-size:14px}
  .controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px}
  .controls input{flex:1;min-width:220px;background:var(--card);border:1px solid var(--line);color:var(--txt);padding:10px 14px;border-radius:10px;font-size:14px}
  .btn{background:var(--card);border:1px solid var(--line);color:var(--txt);padding:10px 16px;border-radius:10px;font-size:13px;cursor:pointer;transition:.15s}
  .btn:hover{border-color:var(--gold)}
  .btn.active{background:var(--gold);color:#1a160f;border-color:var(--gold);font-weight:600}
  .group{margin-bottom:34px}
  .group-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .group-head h2{font-size:16px;font-weight:600}
  .count{color:var(--muted);font-size:13px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
  .card{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--line);border-radius:12px;padding:16px 18px}
  .card.hi{border-left-color:var(--hi)}
  .card.med{border-left-color:var(--med)}
  .card.low{border-left-color:var(--low)}
  .card .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px}
  .card h3{font-size:16px;font-weight:600}
  .badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:3px 8px;border-radius:20px;white-space:nowrap}
  .badge.hi{background:rgba(224,72,77,.15);color:#ff8a8d}
  .badge.med{background:rgba(224,162,58,.15);color:#ffce7a}
  .badge.low{background:rgba(90,143,107,.15);color:#8fd4a6}
  .type{color:var(--gold);font-size:12px;margin-bottom:10px}
  .meta{font-size:13px;color:var(--muted);margin:3px 0}
  .meta b{color:var(--txt);font-weight:500}
  .links{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .links a{font-size:12px;text-decoration:none;color:var(--txt);background:#252225;border:1px solid var(--line);padding:5px 10px;border-radius:7px;transition:.15s}
  .links a:hover{border-color:var(--gold);color:var(--gold)}
  .note{font-size:12px;color:var(--muted);margin-top:11px;padding-top:11px;border-top:1px solid var(--line);font-style:italic}
  .hidden{display:none}
  select.sort{background:var(--card);border:1px solid var(--line);color:var(--txt);padding:10px 14px;border-radius:10px;font-size:13px;cursor:pointer}
  .del{background:transparent;border:1px solid var(--line);color:var(--muted);width:24px;height:24px;border-radius:6px;cursor:pointer;font-size:14px;line-height:1;flex:none;transition:.15s}
  .del:hover{border-color:var(--hi);color:#ff8a8d}
  .card .top{align-items:center}
  .top-right{display:flex;align-items:center;gap:8px}
  .edit{margin-top:11px;padding-top:11px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:8px}
  .edit .row{display:flex;align-items:center;gap:8px}
  .edit label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  select.pr-sel{background:#252225;border:1px solid var(--line);color:var(--txt);padding:5px 8px;border-radius:7px;font-size:12px;cursor:pointer}
  textarea.cmt{width:100%;background:#252225;border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px 10px;font-size:12px;font-family:inherit;resize:vertical;min-height:38px}
  textarea.cmt:focus{outline:none;border-color:var(--gold)}
  textarea.cmt.saved{border-color:var(--low)}
  .out-row{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
  .out-row input{width:16px;height:16px;accent-color:var(--low);cursor:pointer;flex:none}
  .out-row span{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .card.done{opacity:.55}
  .card.done h3{text-decoration:line-through;text-decoration-color:var(--muted)}
  .card.done .out-row span{color:var(--low)}
  .badge.done{background:rgba(90,143,107,.18);color:#8fd4a6}
  .contacted{font-size:11px;color:var(--low);margin-top:6px}
  /* --- session / connection chrome --- */
  .topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
  .who{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:10px}
  .who .dot{width:8px;height:8px;border-radius:50%;background:var(--muted)}
  .who .dot.live{background:var(--low);box-shadow:0 0 0 3px rgba(90,143,107,.18)}
  .who a{color:var(--gold);cursor:pointer}
  /* --- login gate --- */
  .gate{position:fixed;inset:0;background:rgba(15,14,15,.96);display:flex;align-items:center;justify-content:center;z-index:50}
  .gate.hidden{display:none}
  .gate .box{width:340px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:28px}
  .gate h2{font-size:20px;margin-bottom:4px}
  .gate h2 span{color:var(--gold)}
  .gate p{font-size:12px;color:var(--muted);margin-bottom:18px}
  .gate input{width:100%;background:#252225;border:1px solid var(--line);color:var(--txt);padding:11px 13px;border-radius:9px;font-size:14px;margin-bottom:10px}
  .gate input:focus{outline:none;border-color:var(--gold)}
  .gate button{width:100%;background:var(--gold);color:#1a160f;border:none;padding:11px;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}
  .gate .err{color:#ff8a8d;font-size:12px;min-height:16px;margin-top:8px}
  .banner{background:rgba(224,162,58,.12);border:1px solid var(--med);color:#ffce7a;font-size:13px;padding:12px 16px;border-radius:10px;margin-bottom:20px}
</style>
</head>

 {n:"Taka Spa",t:"Day spa",c:"Riga",a:"",p:"",e:"",ig:"",w:"takaspa.lv",book:"",pr:"low",note:"Has site."},
 {n:"VSpa",t:"Massage / Spa",c:"Riga",a:"",p:"+371 26961181",e:"",ig:"",w:"vspa.lv",book:"",pr:"low",note:"Has site."}
];
// map a SEED row -> DB column shape
const seedToRow = s => ({
  name:s.n, type:s.t||null, city:s.c||null, address:s.a||null, phone:s.p||null,
  email:s.e||null, ig:s.ig||null, fb:s.fb||null, website:s.w||null,
  booking:s.book||null, note:s.note||null, priority:s.pr||'med'
});

/* ==================================================================== */

const labels = {hi:"High priority — no website",med:"Medium — outdated website",low:"Low — already has a site"};
const board  = document.getElementById('board');
const $ = id => document.getElementById(id);

const configured = SUPABASE_URL.startsWith('http') && !SUPABASE_ANON_KEY.startsWith('PASTE');
if(!configured) $('cfgBanner').classList.remove('hidden');

const sb = configured ? createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

let state = [];          // all rows from DB (including deleted)
let me    = null;        // current user email
let sortMode = 'default';
let filter = 'all';
let hideDone = false;

/* ---------------- auth ---------------- */
async function initAuth(){
  if(!configured){ $('gate').classList.add('hidden'); return; }
  const { data:{ session } } = await sb.auth.getSession();
  if(session) onSignedIn(session); else $('gate').classList.remove('hidden');
  sb.auth.onAuthStateChange((_e, s)=>{ if(s) onSignedIn(s); });
}
async function signIn(){
  $('gErr').textContent = '';
  const email = $('gEmail').value.trim(), password = $('gPass').value;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if(error) $('gErr').textContent = error.message;
}
async function signOut(){ await sb.auth.signOut(); location.reload(); }
async function onSignedIn(session){
  me = session.user.email;
  $('gate').classList.add('hidden');
  renderWho(true);
  await load();
  subscribe();
}
function renderWho(live){
  $('who').innerHTML = me
    ? `<span class="dot ${live?'live':''}" title="${live?'Live sync on':'connecting…'}"></span> ${me} &middot; <a id="out">sign out</a>`
    : '';
  if($('out')) $('out').onclick = signOut;
}

/* ---------------- data ---------------- */
async function load(){
  const { data, error } = await sb.from('leads').select('*');
  if(error){ console.error(error); return; }
  state = data || [];
  render();
}
function subscribe(){
  sb.channel('leads-live')
    .on('postgres_changes', { event:'*', schema:'public', table:'leads' }, payload=>{
      const r = payload.new || payload.old;
      if(payload.eventType === 'DELETE'){ state = state.filter(x=>x.id!==r.id); }
      else {
        const i = state.findIndex(x=>x.id===r.id);
        if(i>=0) state[i] = payload.new; else state.push(payload.new);
      }
      render();
    })
    .subscribe(status=>{ renderWho(status==='SUBSCRIBED'); });
}

// optimistic local patch + DB write
async function patch(id, fields){
  const i = state.findIndex(x=>x.id===id);
  if(i>=0){ state[i] = {...state[i], ...fields}; }
  const { error } = await sb.from('leads').update(fields).eq('id', id);
  if(error){ console.error(error); alert('Save failed: '+error.message); await load(); }
}

async function seed(){
  if(!confirm('Import the 66 starter leads into the shared database?')) return;
  const rows = SEED.map(seedToRow);
  const { error } = await sb.from('leads').insert(rows);
  if(error){ alert('Import failed: '+error.message); return; }
  await load();
}

/* ---------------- rendering ---------------- */
function fmtWhen(ts){
  if(!ts) return '';
  const d = new Date(ts);
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'}) + ' ' +
         d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}
function card(l){
  const links = [];
  if(l.phone)   links.push(`<a href="tel:${l.phone.split(' / ')[0].replace(/\s/g,'')}">📞 Call</a>`);
  if(l.email)   links.push(`<a href="mailto:${l.email}">✉️ Email</a>`);
  if(l.ig)      links.push(`<a href="https://instagram.com/${l.ig}" target="_blank">📷 @${l.ig}</a>`);
  if(l.fb)      links.push(`<a href="https://facebook.com/${l.fb}" target="_blank">📘 Facebook</a>`);
  if(l.website) links.push(`<a href="https://${l.website}" target="_blank">🌐 ${l.website}</a>`);
  if(l.booking && !l.website) links.push(`<span style="font-size:12px;color:var(--muted);padding:5px 0">via ${l.booking}</span>`);
  const pr = l.priority, done = l.outreached;
  const cmt = l.comment || '';
  const opt = (v,t)=>`<option value="${v}"${pr===v?' selected':''}>${t}</option>`;
  const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
  return `<div class="card ${pr}${done?' done':''}" data-pr="${pr}" data-out="${done?1:0}" data-id="${l.id}" data-s="${esc((l.name+' '+(l.type||'')+' '+(l.city||'')+' '+(l.note||'')+' '+cmt).toLowerCase())}">
    <div class="top"><h3>${esc(l.name)}</h3><div class="top-right">${done?'<span class="badge done">✓ Sent</span>':''}<span class="badge ${pr}">${pr}</span><button class="del" title="Delete lead">&times;</button></div></div>
    <div class="type">${esc(l.type)}</div>
    ${l.city?`<div class="meta">📍 <b>${esc(l.city)}</b>${l.address?` — ${esc(l.address)}`:''}</div>`:''}
    ${l.phone?`<div class="meta">${esc(l.phone)}</div>`:''}
    ${l.email?`<div class="meta">${esc(l.email)}</div>`:''}
    <div class="links">${links.join('')}</div>
    ${l.note?`<div class="note">${esc(l.note)}</div>`:''}
    <div class="edit">
      <label class="out-row"><input type="checkbox" class="out-chk"${done?' checked':''}><span>Outreached</span></label>
      ${done&&l.contacted_by?`<div class="contacted">✓ by ${esc(l.contacted_by)} · ${fmtWhen(l.contacted_at)}</div>`:''}
      <div class="row"><label>Priority</label>
        <select class="pr-sel">${opt('hi','High')}${opt('med','Mid')}${opt('low','Low')}</select>
      </div>
      <textarea class="cmt" placeholder="Add your comment / notes...">${esc(cmt)}</textarea>
    </div>
  </div>`;
}

function sortItems(items){
  if(sortMode==='name') return [...items].sort((a,b)=>a.name.localeCompare(b.name));
  if(sortMode==='city') return [...items].sort((a,b)=>(a.city||'').localeCompare(b.city||'') || a.name.localeCompare(b.name));
  if(sortMode==='type') return [...items].sort((a,b)=>(a.type||'').localeCompare(b.type||'') || a.name.localeCompare(b.name));
  return items;
}

function render(){
  if(!configured){ board.innerHTML = ''; return; }
  const live = state.filter(l=>!l.deleted);
  if(state.length===0){
    board.innerHTML = `<div class="banner">The shared list is empty. <a id="seedBtn" style="color:var(--gold);cursor:pointer;text-decoration:underline">Import the 66 starter leads</a> to get going — or just start adding rows in Supabase.</div>`;
    if($('seedBtn')) $('seedBtn').onclick = seed;
    updateOutCount(); return;
  }
  let html='';
  ['hi','med','low'].forEach(pr=>{
    const items = sortItems(live.filter(l=>l.priority===pr));
    if(!items.length) return;
    html += `<div class="group" data-group="${pr}">
      <div class="group-head"><h2>${labels[pr]}</h2><span class="count">${items.length} leads</span></div>
      <div class="grid">${items.map(card).join('')}</div></div>`;
  });
  board.innerHTML = html;
  bindCardEvents();
  updateOutCount();
  apply();
}

function bindCardEvents(){
  document.querySelectorAll('.del').forEach(b=>b.addEventListener('click',e=>{
    const id = e.target.closest('.card').dataset.id;
    patch(id, { deleted:true });
  }));
  document.querySelectorAll('.pr-sel').forEach(s=>s.addEventListener('change',e=>{
    const id = e.target.closest('.card').dataset.id;
    patch(id, { priority:e.target.value });
  }));
  document.querySelectorAll('.cmt').forEach(t=>{
    let timer;
    t.addEventListener('input',e=>{
      const id = e.target.closest('.card').dataset.id;
      e.target.classList.add('saved');
      clearTimeout(timer);
      timer = setTimeout(()=>patch(id, { comment:e.target.value }), 600);
    });
  });
  document.querySelectorAll('.out-chk').forEach(c=>c.addEventListener('change',e=>{
    const id = e.target.closest('.card').dataset.id;
    if(e.target.checked) patch(id, { outreached:true,  contacted_by:me, contacted_at:new Date().toISOString() });
    else                 patch(id, { outreached:false, contacted_by:null, contacted_at:null });
  }));
}

function updateOutCount(){
  const live = state.filter(l=>!l.deleted);
  const done = live.filter(l=>l.outreached).length;
  $('outStat').textContent = done+' / '+live.length+' outreached';
  $('delCount').textContent = state.filter(l=>l.deleted).length;
}

/* ---------------- controls ---------------- */
const search = $('search');
function apply(){
  const q = search.value.toLowerCase();
  document.querySelectorAll('.card').forEach(c=>{
    const okF = filter==='all' || c.dataset.pr===filter;
    const okQ = !q || c.dataset.s.includes(q);
    const okD = !hideDone || c.dataset.out!=='1';
    c.classList.toggle('hidden', !(okF&&okQ&&okD));
  });
  document.querySelectorAll('.group').forEach(g=>{
    const vis = g.querySelectorAll('.card:not(.hidden)').length;
    g.classList.toggle('hidden', vis===0);
    g.querySelector('.count').textContent = vis+' leads';
  });
}
search.addEventListener('input', apply);
document.querySelectorAll('.btn[data-f]').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.btn[data-f]').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); filter=b.dataset.f; apply();
}));
$('hideDone').addEventListener('click',e=>{
  hideDone=!hideDone; e.target.classList.toggle('active',hideDone);
  e.target.textContent = hideDone?'Show outreached':'Hide outreached';
  apply();
});
$('restore').addEventListener('click', async ()=>{
  const del = state.filter(l=>l.deleted);
  if(!del.length) return;
  if(!confirm(`Restore ${del.length} deleted lead(s)?`)) return;
  await sb.from('leads').update({ deleted:false }).eq('deleted', true);
  await load();
});
$('sort').addEventListener('change',e=>{ sortMode=e.target.value; render(); });

// login gate handlers
$('gBtn').addEventListener('click', signIn);
$('gPass').addEventListener('keydown', e=>{ if(e.key==='Enter') signIn(); });

initAuth();
</script>
</body>
