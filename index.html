<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outreach Tracker — shared</title>
<style>
  :root{
    --bg:#0f0e0f; --card:#1a181a; --line:#2a272a; --txt:#f2ede9; --muted:#9a9398;
    --gold:#c9a96a; --hi:#e0484d; --med:#e0a23a; --low:#5a8f6b; --ok:#5a8f6b; --blue:#5a7fbf;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--txt);line-height:1.4}
  .wrap{max-width:1200px;margin:0 auto;padding:32px 20px 80px}
  h1{font-size:28px;font-weight:700;letter-spacing:-.5px}
  h1 span{color:var(--gold)}
  .sub{color:var(--muted);margin:6px 0 24px;font-size:14px}
  .apphead{display:flex;align-items:center;justify-content:space-between;gap:16px}
  .controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px}
  .controls input[type=text]{flex:1;min-width:220px;background:var(--card);border:1px solid var(--line);color:var(--txt);padding:10px 14px;border-radius:10px;font-size:14px}
  .btn{background:var(--card);border:1px solid var(--line);color:var(--txt);padding:10px 16px;border-radius:10px;font-size:13px;cursor:pointer;transition:.15s}
  .btn:hover{border-color:var(--gold)}
  .btn.active{background:var(--gold);color:#1a160f;border-color:var(--gold);font-weight:600}
  .btn.primary{background:var(--gold);color:#1a160f;border-color:var(--gold);font-weight:600}
  .map-btn{display:inline-grid;place-items:center;width:42px;height:42px;border-radius:11px;background:var(--gold);color:#1a160f;border:1px solid var(--gold);cursor:pointer;text-decoration:none;flex:none;animation:mapPulse 2s ease-out infinite}
  .map-btn:hover{filter:brightness(1.08)}
  @keyframes mapPulse{0%{box-shadow:0 0 0 0 rgba(201,169,106,.55)}70%{box-shadow:0 0 0 13px rgba(201,169,106,0)}100%{box-shadow:0 0 0 0 rgba(201,169,106,0)}}
  @media (prefers-reduced-motion: reduce){.map-btn{animation:none}}
  select.sort,select.status-sel{background:var(--card);border:1px solid var(--line);color:var(--txt);padding:9px 12px;border-radius:9px;font-size:13px;cursor:pointer}
  .group{margin-bottom:34px}
  .group-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .group-head h2{font-size:16px;font-weight:600}
  .count{color:var(--muted);font-size:13px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
  .card{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--line);border-radius:12px;padding:16px 18px}
  .card.hi{border-left-color:var(--hi)}
  .card.med{border-left-color:var(--med)}
  .card.low{border-left-color:var(--low)}
  .card .top{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:4px}
  .card h3{font-size:16px;font-weight:600}
  .badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:3px 8px;border-radius:20px;white-space:nowrap}
  .cat-tag{font-size:10.5px;font-weight:600;color:var(--gold);background:rgba(201,169,106,.12);border:1px solid rgba(201,169,106,.28);padding:3px 9px;border-radius:20px;white-space:nowrap}
  .badge.hi{background:rgba(224,72,77,.15);color:#ff8a8d}
  .badge.med{background:rgba(224,162,58,.15);color:#ffce7a}
  .badge.low{background:rgba(90,143,107,.15);color:#8fd4a6}
  .meta{font-size:13px;color:var(--muted);margin:3px 0}
  .note{font-size:12px;color:var(--muted);margin-top:11px;padding-top:11px;border-top:1px solid var(--line);font-style:italic}
  .hidden{display:none!important}
  .card .top-right{display:flex;align-items:center;gap:8px}

  /* status row */
  .statusrow{display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap}
  .st-badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:3px 9px;border-radius:20px}
  .st-todo{background:#2a272a;color:var(--muted)}
  .st-contacted{background:rgba(90,143,107,.18);color:#8fd4a6}
  .st-replied{background:rgba(90,127,191,.18);color:#9db9ee}
  .st-client{background:rgba(201,169,106,.2);color:#e8cd92}
  .contacted-line{font-size:11.5px;color:var(--ok);margin-top:8px}
  .card.done h3{opacity:.85}
  .mark-btn{font-size:12px;padding:7px 12px;border-radius:8px;background:#252225;border:1px solid var(--line);color:var(--txt);cursor:pointer;transition:.15s}
  .mark-btn:hover{border-color:var(--ok);color:#8fd4a6}

  /* login */
  .login-overlay{position:fixed;inset:0;display:grid;place-items:center;background:radial-gradient(120% 80% at 50% 0%,#1a181a,#0f0e0f);z-index:50;padding:20px}
  .login-card{width:100%;max-width:360px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:30px 26px;display:flex;flex-direction:column;gap:12px}
  .login-card h1{font-size:22px}
  .login-card input{background:#252225;border:1px solid var(--line);color:var(--txt);padding:11px 14px;border-radius:10px;font-size:14px}
  .login-card input:focus{outline:none;border-color:var(--gold)}
  .err{color:#ff8a8d;font-size:13px;min-height:16px;margin:0}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--line);color:var(--txt);padding:10px 16px;border-radius:10px;font-size:13px;z-index:60;opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}
</style>
</head>
<body>

<!-- ===== LOGIN GATE ===== -->
<div id="login" class="login-overlay">
  <form id="loginForm" class="login-card">
    <h1>Outreach <span style="color:var(--gold)">Tracker</span></h1>
    <p class="sub" style="margin:0 0 6px">Sign in — only the two of you have access.</p>
    <input id="email" type="email" placeholder="email" autocomplete="username" required>
    <input id="password" type="password" placeholder="password" autocomplete="current-password" required>
    <button type="submit" class="btn primary" id="loginBtn">Sign in</button>
    <p id="loginErr" class="err"></p>
    <p class="sub" style="text-align:center;margin:0;font-size:12px">269 līdi · saraksts + karte aiz login</p>
  </form>
</div>

<!-- ===== APP ===== -->
<div id="app" class="wrap hidden">
  <div class="apphead">
    <h1><span>Outreach</span> Leads</h1>
    <div style="display:flex;gap:8px;align-items:center">
      <a class="map-btn" href="dm-karte.html" title="Prospektu karte" aria-label="Prospektu karte">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
      </a>
      <button id="signout" class="btn">Sign out</button>
    </div>
  </div>
  <p class="sub" id="who"></p>

  <div class="controls">
    <input id="search" type="text" placeholder="Search name, contact, notes...">
    <button class="btn active" data-f="all">All</button>
    <button class="btn" data-f="hi">High</button>
    <button class="btn" data-f="med">Medium</button>
    <button class="btn" data-f="low">Low</button>
    <select class="sort" id="catFilter"><option value="all">All categories</option></select>
    <select class="sort" id="statusFilter"><option value="all">All statuses</option><option value="todo">To do</option><option value="contacted">Contacted</option><option value="replied">Replied</option><option value="client">Client</option></select>
    <select class="sort" id="sort">
      <option value="updated">Sort: Recently updated</option>
      <option value="name">Sort: Name A–Z</option>
      <option value="status">Sort: Status</option>
    </select>
    <button class="btn" id="hideDone">Hide contacted</button>
  </div>
  <p class="sub" style="margin-top:-16px"><b id="outStat" style="color:var(--ok)"></b></p>

  <div id="board"></div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

/* ================= CONFIG — safe to commit (RLS protects data) ================= */
const SUPABASE_URL  = 'https://wcwugxgyylvdorsrqzep.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indjd3VneGd5eWx2ZG9yc3JxemVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzI2MzAsImV4cCI6MjA5NzEwODYzMH0.ZTKtbZOPevM39MVJYkuWqoZcYsDsjc7YwQsex72-Lmg';
/* =============================================================================== */

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const loginEl = document.getElementById('login');
const appEl   = document.getElementById('app');
const boardEl = document.getElementById('board');
const STATUS = { todo:'To do', contacted:'Contacted', replied:'Replied', client:'Client' };
const PR_LABEL = { hi:'High priority', med:'Medium', low:'Low' };
const CAT_LABELS = { saloni:'Saloni', frizieri:'Frizētavas', nagi:'Nagu studijas', skropstas:'Skropstas/uzacis', kosmetika:'Kosmetika/PMU', spa:'SPA/masāža', konditoreja:'Konditorejas', dzivnieki:'Dzīvnieku saloni', autoservisi:'Autoservisi', juristi:'Juristi', restorani:'Restorāni', zobarsti:'Zobārsti' };

let clients = [];          // current rows
let currentEmail = '';
let filter = 'all', catFilter = 'all', statusFilter = 'all', hideDone = false, sortMode = 'updated';

/* ---------- auth ---------- */
async function boot() {
  const { data:{ session } } = await supabase.auth.getSession();
  if (session) await startApp(session);
}
supabase.auth.onAuthStateChange((_e, session) => {
  if (!session) { appEl.classList.add('hidden'); loginEl.classList.remove('hidden'); }
});

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginErr');
  err.textContent = ''; btn.disabled = true; btn.textContent = 'Signing in…';
  const { data, error } = await supabase.auth.signInWithPassword({
    email: document.getElementById('email').value.trim(),
    password: document.getElementById('password').value,
  });
  btn.disabled = false; btn.textContent = 'Sign in';
  if (error) { err.textContent = error.message; return; }
  await startApp(data.session);
});

document.getElementById('signout').addEventListener('click', async () => {
  await supabase.auth.signOut();
  location.reload();
});

async function startApp(session) {
  // if we were sent here by the map gate, bounce back after auth
  const next = new URLSearchParams(location.search).get('next');
  if (next === 'dm-karte.html') { location.replace('dm-karte.html'); return; }
  currentEmail = session.user.email;
  document.getElementById('who').textContent = 'Signed in as ' + currentEmail;
  loginEl.classList.add('hidden');
  appEl.classList.remove('hidden');
  // ensure realtime uses the authenticated token so RLS lets row changes through
  try { supabase.realtime.setAuth(session.access_token); } catch (_) {}
  await loadClients();
  subscribeRealtime();
}

/* ---------- data ---------- */
async function loadClients() {
  const { data, error } = await supabase
    .from('clients').select('*').order('updated_at', { ascending: false });
  if (error) { toast('Load failed: ' + error.message); return; }
  clients = data || [];
  render();
}

async function changeStatus(client, status) {
  const patch = { status };
  if (status !== 'todo' && !client.contacted_at) {
    patch.contacted_by = currentEmail;
    patch.contacted_at = new Date().toISOString();
  }
  // optimistic
  Object.assign(client, patch, { updated_at: new Date().toISOString() });
  render();
  const { error } = await supabase.from('clients').update(patch).eq('id', client.id);
  if (error) { toast('Update failed: ' + error.message); await loadClients(); }
  else toast(status === 'contacted' ? 'Marked contacted' : 'Status → ' + STATUS[status]);
}

/* ---------- realtime ---------- */
function subscribeRealtime() {
  supabase.channel('clients-rt')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'clients' }, (payload) => {
      const row = payload.new && payload.new.id ? payload.new : payload.old;
      if (!row) return;
      if (payload.eventType === 'DELETE') {
        clients = clients.filter(c => c.id !== row.id);
      } else {
        const i = clients.findIndex(c => c.id === row.id);
        if (i >= 0) clients[i] = payload.new; else clients.push(payload.new);
      }
      render();
    })
    .subscribe();
}

/* ---------- render ---------- */
function fmtDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleDateString('lv-LV', { day:'numeric', month:'short' }) + ' ' +
         d.toLocaleTimeString('lv-LV', { hour:'2-digit', minute:'2-digit' });
}
const esc = (s) => (s || '').replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m]));

function cardHtml(c) {
  const pr = (c.priority || 'low');
  const done = c.status && c.status !== 'todo';
  const opt = (v) => `<option value="${v}"${c.status===v?' selected':''}>${STATUS[v]}</option>`;
  const contactedLine = (c.contacted_by)
    ? `<div class="contacted-line">✓ ${esc(c.contacted_by)} · ${fmtDate(c.contacted_at)}</div>` : '';
  const markBtn = (c.status === 'todo')
    ? `<button class="mark-btn" data-mark="${c.id}">Mark contacted</button>` : '';
  const cat = c.category || '';
  const catLabel = CAT_LABELS[cat] || cat;
  return `<div class="card ${pr}${done?' done':''}" data-id="${c.id}"
      data-s="${esc(((c.name||'')+' '+(c.contact||'')+' '+(c.notes||'')+' '+catLabel).toLowerCase())}"
      data-pr="${pr}" data-cat="${cat}" data-status="${c.status||'todo'}">
    <div class="top"><h3>${esc(c.name)}</h3>
      <div class="top-right">${cat?`<span class="cat-tag">${esc(catLabel)}</span>`:''}<span class="badge ${pr}">${pr}</span></div>
    </div>
    ${c.contact ? `<div class="meta">${esc(c.contact)}</div>` : ''}
    ${c.notes ? `<div class="note">${esc(c.notes)}</div>` : ''}
    <div class="statusrow">
      <span class="st-badge st-${c.status||'todo'}">${STATUS[c.status||'todo']}</span>
      <select class="status-sel" data-sel="${c.id}">${opt('todo')}${opt('contacted')}${opt('replied')}${opt('client')}</select>
      ${markBtn}
    </div>
    ${contactedLine}
  </div>`;
}

function render() {
  const groups = { hi:[], med:[], low:[] };
  sortItems(clients).forEach(c => (groups[c.priority] || groups.low).push(c));
  let html = '';
  ['hi','med','low'].forEach(pr => {
    if (!groups[pr].length) return;
    html += `<div class="group" data-group="${pr}">
      <div class="group-head"><h2>${PR_LABEL[pr]}</h2><span class="count">${groups[pr].length}</span></div>
      <div class="grid">${groups[pr].map(cardHtml).join('')}</div></div>`;
  });
  boardEl.innerHTML = html || '<p class="sub">No clients yet.</p>';
  populateCats();
  updateStat();
  applyFilter();
}

function populateCats() {
  const sel = document.getElementById('catFilter');
  const cur = sel.value;
  const counts = {};
  clients.forEach(c => { if (c.category) counts[c.category] = (counts[c.category] || 0) + 1; });
  const cats = Object.keys(counts).sort((a, b) => counts[b] - counts[a]);
  sel.innerHTML = `<option value="all">All categories (${clients.length})</option>` +
    cats.map(c => `<option value="${c}">${CAT_LABELS[c] || c} (${counts[c]})</option>`).join('');
  sel.value = (cur === 'all' || cats.includes(cur)) ? cur : 'all';
  catFilter = sel.value;
}

function sortItems(items) {
  const a = [...items];
  if (sortMode === 'name')   return a.sort((x,y) => (x.name||'').localeCompare(y.name||''));
  if (sortMode === 'status') return a.sort((x,y) => (x.status||'').localeCompare(y.status||''));
  return a.sort((x,y) => new Date(y.updated_at) - new Date(x.updated_at)); // recently updated
}

function updateStat() {
  const done = clients.filter(c => c.status && c.status !== 'todo').length;
  document.getElementById('outStat').textContent = `${done} / ${clients.length} contacted`;
}

/* ---------- filter / search / sort ---------- */
const searchEl = document.getElementById('search');
function applyFilter() {
  const q = searchEl.value.toLowerCase();
  document.querySelectorAll('.card').forEach(card => {
    const okF = filter === 'all' || card.dataset.pr === filter;
    const okQ = !q || card.dataset.s.includes(q);
    const okD = !hideDone || card.dataset.status === 'todo';
    const okC = catFilter === 'all' || card.dataset.cat === catFilter;
    const okS = statusFilter === 'all' || card.dataset.status === statusFilter;
    card.classList.toggle('hidden', !(okF && okQ && okD && okC && okS));
  });
  document.querySelectorAll('.group').forEach(g => {
    const vis = g.querySelectorAll('.card:not(.hidden)').length;
    g.classList.toggle('hidden', vis === 0);
    g.querySelector('.count').textContent = vis;
  });
}
searchEl.addEventListener('input', applyFilter);
document.getElementById('catFilter').addEventListener('change', (e) => { catFilter = e.target.value; applyFilter(); });
document.getElementById('statusFilter').addEventListener('change', (e) => { statusFilter = e.target.value; applyFilter(); });
document.querySelectorAll('.btn[data-f]').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.btn[data-f]').forEach(x => x.classList.remove('active'));
  b.classList.add('active'); filter = b.dataset.f; applyFilter();
}));
document.getElementById('hideDone').addEventListener('click', (e) => {
  hideDone = !hideDone; e.target.classList.toggle('active', hideDone);
  e.target.textContent = hideDone ? 'Show contacted' : 'Hide contacted';
  applyFilter();
});
document.getElementById('sort').addEventListener('change', (e) => { sortMode = e.target.value; render(); });

/* ---------- card actions (event delegation) ---------- */
boardEl.addEventListener('click', (e) => {
  const mark = e.target.closest('[data-mark]');
  if (mark) {
    const c = clients.find(x => x.id === mark.dataset.mark);
    if (c) changeStatus(c, 'contacted');
  }
});
boardEl.addEventListener('change', (e) => {
  const sel = e.target.closest('[data-sel]');
  if (sel) {
    const c = clients.find(x => x.id === sel.dataset.sel);
    if (c) changeStatus(c, sel.value);
  }
});

/* ---------- toast ---------- */
let toastT;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(() => t.classList.remove('show'), 2200);
}

boot();
</script>
</body>
</html>
