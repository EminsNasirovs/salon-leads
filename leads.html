<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beauty Salon Outreach Leads</title>
<style>
  :root{
    --bg:#0f0e0f; --card:#1a181a; --line:#2a272a; --txt:#f2ede9; --muted:#9a9398;
    --gold:#c9a96a; --hi:#e0484d; --med:#e0a23a; --low:#5a8f6b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--txt);padding:32px 20px 80px;line-height:1.4}
  .wrap{max-width:1200px;margin:0 auto}
  h1{font-size:28px;font-weight:700;letter-spacing:-.5px}
  h1 span{color:var(--gold)}
  .sub{color:var(--muted);margin:6px 0 24px;font-size:14px}
  .controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px}
  .controls input{flex:1;min-width:220px;background:var(--card);border:1px solid var(--line);color:var(--txt);padding:10px 14px;border-radius:10px;font-size:14px}
  .btn{background:var(--card);border:1px solid var(--line);color:var(--txt);padding:10px 16px;border-radius:10px;font-size:13px;cursor:pointer;transition:.15s}
  .btn:hover{border-color:var(--gold)}
  .btn.active{background:var(--gold);color:#1a160f;border-color:var(--gold);font-weight:600}
  .group{margin-bottom:34px}
  .group-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .group-head h2{font-size:16px;font-weight:600}
  .count{color:var(--muted);font-size:13px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
  .card{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--line);border-radius:12px;padding:16px 18px}
  .card.hi{border-left-color:var(--hi)}
  .card.med{border-left-color:var(--med)}
  .card.low{border-left-color:var(--low)}
  .card .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px}
  .card h3{font-size:16px;font-weight:600}
  .badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:3px 8px;border-radius:20px;white-space:nowrap}
  .badge.hi{background:rgba(224,72,77,.15);color:#ff8a8d}
  .badge.med{background:rgba(224,162,58,.15);color:#ffce7a}
  .badge.low{background:rgba(90,143,107,.15);color:#8fd4a6}
  .type{color:var(--gold);font-size:12px;margin-bottom:10px}
  .meta{font-size:13px;color:var(--muted);margin:3px 0}
  .meta b{color:var(--txt);font-weight:500}
  .links{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .links a{font-size:12px;text-decoration:none;color:var(--txt);background:#252225;border:1px solid var(--line);padding:5px 10px;border-radius:7px;transition:.15s}
  .links a:hover{border-color:var(--gold);color:var(--gold)}
  .note{font-size:12px;color:var(--muted);margin-top:11px;padding-top:11px;border-top:1px solid var(--line);font-style:italic}
  .hidden{display:none}
  select.sort{background:var(--card);border:1px solid var(--line);color:var(--txt);padding:10px 14px;border-radius:10px;font-size:13px;cursor:pointer}
  .del{background:transparent;border:1px solid var(--line);color:var(--muted);width:24px;height:24px;border-radius:6px;cursor:pointer;font-size:14px;line-height:1;flex:none;transition:.15s}
  .del:hover{border-color:var(--hi);color:#ff8a8d}
  .card .top{align-items:center}
  .top-right{display:flex;align-items:center;gap:8px}
  .edit{margin-top:11px;padding-top:11px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:8px}
  .edit .row{display:flex;align-items:center;gap:8px}
  .edit label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  select.pr-sel{background:#252225;border:1px solid var(--line);color:var(--txt);padding:5px 8px;border-radius:7px;font-size:12px;cursor:pointer}
  textarea.cmt{width:100%;background:#252225;border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px 10px;font-size:12px;font-family:inherit;resize:vertical;min-height:38px}
  textarea.cmt:focus{outline:none;border-color:var(--gold)}
  textarea.cmt.saved{border-color:var(--low)}
  .out-row{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
  .out-row input{width:16px;height:16px;accent-color:var(--low);cursor:pointer;flex:none}
  .out-row span{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .card.done{opacity:.55}
  .card.done h3{text-decoration:line-through;text-decoration-color:var(--muted)}
  .card.done .out-row span{color:var(--low)}
  .badge.done{background:rgba(90,143,107,.18);color:#8fd4a6}
</style>
</head>

// ---- deleted leads persist in the browser ----
let deleted = new Set(JSON.parse(localStorage.getItem('deletedLeads') || '[]'));
function saveDeleted(){
  localStorage.setItem('deletedLeads', JSON.stringify([...deleted]));
  document.getElementById('delCount').textContent = deleted.size;
}

// ---- per-lead overrides (custom priority + comment) persist in the browser ----
let overrides = JSON.parse(localStorage.getItem('leadOverrides') || '{}');
function saveOverrides(){ localStorage.setItem('leadOverrides', JSON.stringify(overrides)); }
function getPr(l){ return (overrides[l.n] && overrides[l.n].pr) || l.pr; }
function getComment(l){ return (overrides[l.n] && overrides[l.n].comment) || ''; }
function getOutreached(l){ return !!(overrides[l.n] && overrides[l.n].outreached); }
function setOverride(name, key, val){
  overrides[name] = overrides[name] || {};
  overrides[name][key] = val;
  saveOverrides();
}

function card(l){

  if(l.ig) links.push(`<a href="https://instagram.com/${l.ig}" target="_blank">📷 @${l.ig}</a>`);
  if(l.fb) links.push(`<a href="https://facebook.com/${l.fb}" target="_blank">📘 Facebook</a>`);
  if(l.w)  links.push(`<a href="https://${l.w}" target="_blank">🌐 ${l.w}</a>`);
  if(l.book && !l.w) links.push(`<span style="font-size:12px;color:var(--muted);padding:5px 0">via ${l.book}</span>`);
  const pr = getPr(l);
  const comment = getComment(l);
  const done = getOutreached(l);
  const opt = (v,t)=>`<option value="${v}"${pr===v?' selected':''}>${t}</option>`;
  return `<div class="card ${pr}${done?' done':''}" data-pr="${pr}" data-out="${done?1:0}" data-name="${l.n.replace(/"/g,'&quot;')}" data-s="${(l.n+' '+l.t+' '+l.c+' '+l.note+' '+comment).toLowerCase()}">
    <div class="top"><h3>${l.n}</h3><div class="top-right">${done?'<span class="badge done">✓ Sent</span>':''}<span class="badge ${pr}">${pr}</span><button class="del" title="Delete lead">&times;</button></div></div>
    <div class="type">${l.t}</div>
    ${l.c?`<div class="meta">📍 <b>${l.c}</b>${l.a?` — ${l.a}`:''}</div>`:''}
    ${l.p?`<div class="meta">${l.p}</div>`:''}
    ${l.e?`<div class="meta">${l.e}</div>`:''}
    <div class="links">${links.join('')}</div>
    <div class="note">${l.note}</div>
    <div class="edit">
      <label class="out-row"><input type="checkbox" class="out-chk"${done?' checked':''}><span>Outreached</span></label>
      <div class="row"><label>Priority</label>
        <select class="pr-sel">${opt('hi','High')}${opt('med','Mid')}${opt('low','Low')}</select>
      </div>
      <textarea class="cmt" placeholder="Add your comment / notes...">${comment.replace(/</g,'&lt;')}</textarea>
    </div>
  </div>`;
}

let sortMode = 'default';
function sortItems(items){
  if(sortMode==='name') return [...items].sort((a,b)=>a.n.localeCompare(b.n));
  if(sortMode==='city') return [...items].sort((a,b)=>(a.c||'').localeCompare(b.c||'') || a.n.localeCompare(b.n));
  if(sortMode==='type') return [...items].sort((a,b)=>(a.t||'').localeCompare(b.t||'') || a.n.localeCompare(b.n));
  return items;
}

function render(){
  let html='';
  ['hi','med','low'].forEach(pr=>{
    const items = sortItems(leads.filter(l=>getPr(l)===pr && !deleted.has(l.n)));
    if(!items.length) return;
    html += `<div class="group" data-group="${pr}">
      <div class="group-head"><h2>${labels[pr]}</h2><span class="count">${items.length} leads</span></div>
      <div class="grid">${items.map(card).join('')}</div></div>`;
  });
  board.innerHTML = html;
  bindCardEvents();
  updateOutCount();
  apply();
}

function bindCardEvents(){
  // delete
  document.querySelectorAll('.del').forEach(b=>b.addEventListener('click',e=>{
    const name = e.target.closest('.card').dataset.name.replace(/&quot;/g,'"');
    deleted.add(name); saveDeleted(); render();
  }));
  // change priority — re-render so the card moves to the right group
  document.querySelectorAll('.pr-sel').forEach(s=>s.addEventListener('change',e=>{
    const name = e.target.closest('.card').dataset.name.replace(/&quot;/g,'"');
    setOverride(name, 'pr', e.target.value); render();
  }));
  // comments — save on input WITHOUT re-rendering (keeps focus)
  document.querySelectorAll('.cmt').forEach(t=>t.addEventListener('input',e=>{
    const name = e.target.closest('.card').dataset.name.replace(/&quot;/g,'"');
    setOverride(name, 'comment', e.target.value);
    e.target.classList.add('saved');
  }));
  // outreached checkbox — toggle "done" state, persist, update count & visuals
  document.querySelectorAll('.out-chk').forEach(c=>c.addEventListener('change',e=>{
    const card = e.target.closest('.card');
    const name = card.dataset.name.replace(/&quot;/g,'"');
    setOverride(name, 'outreached', e.target.checked);
    card.classList.toggle('done', e.target.checked);
    card.dataset.out = e.target.checked ? 1 : 0;
    let b = card.querySelector('.badge.done');
    if(e.target.checked && !b){ b=document.createElement('span'); b.className='badge done'; b.textContent='✓ Sent'; card.querySelector('.top-right').prepend(b); }
    if(!e.target.checked && b){ b.remove(); }
    updateOutCount(); apply();
  }));
}

function updateOutCount(){
  const total = leads.filter(l=>!deleted.has(l.n)).length;
  const done = leads.filter(l=>!deleted.has(l.n) && getOutreached(l)).length;
  document.getElementById('outStat').textContent = done+' / '+total+' outreached';
}

const search = document.getElementById('search');
let filter = 'all';
let hideDone = false;
function apply(){
  const q = search.value.toLowerCase();
  document.querySelectorAll('.card').forEach(c=>{
    const okF = filter==='all' || c.dataset.pr===filter;
    const okQ = !q || c.dataset.s.includes(q);
    const okD = !hideDone || c.dataset.out!=='1';
    c.classList.toggle('hidden', !(okF&&okQ&&okD));
  });
  document.querySelectorAll('.group').forEach(g=>{
    const vis = g.querySelectorAll('.card:not(.hidden)').length;
    g.classList.toggle('hidden', vis===0);
    g.querySelector('.count').textContent = vis+' leads';
  });
}
search.addEventListener('input', apply);
document.querySelectorAll('.btn[data-f]').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.btn[data-f]').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); filter=b.dataset.f; apply();
}));

// hide outreached toggle
document.getElementById('hideDone').addEventListener('click',e=>{
  hideDone=!hideDone; e.target.classList.toggle('active',hideDone);
  e.target.textContent = hideDone?'Show outreached':'Hide outreached';
  apply();
});

// restore deleted + sorting
document.getElementById('restore').addEventListener('click',()=>{ deleted.clear(); saveDeleted(); render(); });
document.getElementById('sort').addEventListener('change',e=>{ sortMode=e.target.value; render(); });

// initial paint (after apply/search/filter are defined)
saveDeleted();
render();
</script>
</body>
</html>
